<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../Css/login.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.2/css/all.min.css">
    <link rel="stylesheet" href="path/to/font-awesome/css/font-awesome.min.css">
    <title>Perfil</title>
</head>
<body>
    <menu>
        <section>
            <h2>Bienvenido</h2>
            <br>
            <div class="container" id="container">
                <div class="form-container sign-up-container">
                    <form action="#">
                        <h1>Crear Cuenta</h1>
                        <div class="social-container">
                            <a href="#" class="social"><i class="fab fa-facebook-f"></i></a>
                            <a href="#" class="social"><i class="fab fa-google-plus-g"></i></a>
                            <a href="#" class="social"><i class="fab fa-linkedin-in"></i></a>
                        </div>
                        <span>O <br> Usa tu correo para registrarte</span>
                        <input type="text" placeholder="Nombre" />
                        <input type="email" placeholder="Correo" />
                        <input type="password" placeholder="Contraseña" />
                        <button>Registrarse</button>
                    </form>
                </div>
                <div class="form-container sign-in-container">
                    <form action="#">
                        <h1>Inicia Sesión</h1>
                        <div class="social-container">
                            <a href="#" class="social"><i class="fab fa-facebook-f"></i></a>
                            <a href="#" class="social"><i class="fab fa-google-plus-g"></i></a>
                            <a href="#" class="social"><i class="fab fa-linkedin-in"></i></a>
                        </div>
                        <span>O <br> Usa tu correo</span>
                        <input type="email" placeholder="Correo" />
                        <input type="password" placeholder="Contraseña" />
                        <a href="#">¿Olvidaste tu Contraseña?</a>
                        <button>Inicia Sesión</button>
                    </form>
                </div>
                <div class="overlay-container">
                    <div class="overlay">
                        <div class="overlay-panel overlay-left">
                            <h1>Bienvenido de Nuevo!</h1>
                            <p>Si ya tienes una cuenta por favor Inicia Sesión</p>
                            <button class="ghost" id="signIn">Inicia Sesión</button>
                        </div>
                        <div class="overlay-panel overlay-right">
                            <h1>Hola, Amigo!</h1>
                            <p>Si eres nuevo REGISTRATE para que estés al tanto de nuestros productos.</p>
                            <button class="ghost" id="signUp">Registrarse</button>
                        </div>
                    </div>
                </div>
            </div>

            </div>
            <div></div>
            <div></div>
        </section>
    </menu>
    <script src="../JavaScript/login.js"></script>
</body>
</html>
